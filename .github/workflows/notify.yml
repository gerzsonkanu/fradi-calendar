name: Fradi – Változásfigyelő

on:
  schedule:
    - cron: "0 8 * * *"  # Minden nap reggel 8-kor
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Oldal letöltése és hash generálása
        run: |
          CONTENT=$(curl -s -A "Mozilla/5.0" "https://www.fradi.hu/labdarugas/elso-csapat/esemenyek")
          HASH=$(echo "$CONTENT" | md5sum | cut -d' ' -f1)
          echo "Jelenlegi hash: $HASH"
          echo "CURRENT_HASH=$HASH" >> $GITHUB_ENV

      - name: Előző hash betöltése
        run: |
          PREV=$(cat page_hash.txt 2>/dev/null || echo "none")
          echo "Előző hash: $PREV"
          echo "PREV_HASH=$PREV" >> $GITHUB_ENV

      - name: Értesítő küldése ha változott
        if: env.CURRENT_HASH != env.PREV_HASH
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: crunits@gmail.com
          password: ${{ secrets.GMAIL_PASSWORD }}
          subject: "🟢 Fradi – Változás az eseményoldalon!"
          to: crunits@gmail.com
          from: crunits@gmail.com
          body: |
            Változás történt a Fradi eseményoldalán!
            
            Lehet hogy új meccs, időpont vagy helyszín változott.
            
            Nézd meg: https://www.fradi.hu/labdarugas/elso-csapat/esemenyek

      - name: Hash frissítése
        run: |
          echo $CURRENT_HASH > page_hash.txt
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add page_hash.txt
          git diff --cached --quiet || git commit -m "Hash frissítve: $CURRENT_HASH"
          git push
